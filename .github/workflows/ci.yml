name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  php-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - name: PHP lint
        run: find . -name '*.php' -not -path './node_modules/*' | xargs -L1 php -l
