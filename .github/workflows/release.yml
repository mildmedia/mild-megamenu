name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PLUGIN_SLUG: mild-megamenu
    steps:
      - uses: actions/checkout@v5

      - name: Package zip
        run: |
          mkdir -p /tmp/staging/$PLUGIN_SLUG
          rsync -a \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.omc/' \
            --exclude '.claude/' \
            --exclude '.idea/' \
            --exclude 'src/' \
            --exclude 'node_modules/' \
            --exclude 'memory/' \
            --exclude '.DS_Store' \
            --exclude 'package-lock.json' \
            --exclude 'composer.lock' \
            --exclude 'CLAUDE.md' \
            ./ /tmp/staging/$PLUGIN_SLUG/
          cd /tmp/staging
          zip -r "$GITHUB_WORKSPACE/$PLUGIN_SLUG.zip" "$PLUGIN_SLUG"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" "${PLUGIN_SLUG}.zip" --generate-notes --title "$GITHUB_REF_NAME"
